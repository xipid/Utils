[General]
ConfigVersion=2

[Browser]
AllowExpiredCredentials=true
AlwaysAllowAccess=true
AlwaysAllowUpdate=true
Browser_AllowLocalhostWithPasskeys=true
CustomProxyLocation=
Enabled=true
HttpAuthPermission=true
MatchUrlScheme=false
NoMigrationPrompt=true
SearchInAllDatabases=true

[FdoSecrets]
ConfirmAccessItem=false
ConfirmDeleteItem=false
Enabled=true
ShowNotification=false

[GUI]
MinimizeOnStartup=true
ShowExpiredEntriesOnDatabaseUnlockOffsetDays=4
TrayIconAppearance=monochrome-light

[SSHAgent]
Enabled=true

[Security]
ClearClipboard=false
IconDownloadFallback=true
LockDatabaseIdle=false